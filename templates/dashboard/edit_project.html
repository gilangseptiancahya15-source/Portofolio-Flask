{% extends 'base.html' %}
{% block title %}Edit Project{% endblock %}
{% block content %}
<div class="container py-5 my-3">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                <a href="{{ url_for('manage_projects') }}" class="btn btn-outline-secondary btn-sm me-3 shadow-sm"><i class="bi bi-arrow-left"></i> Batal</a>
                <h2 class="fw-bold mb-0 text-primary">Edit Project</h2>
            </div>
            
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <form action="{{ url_for('edit_project', id=project.id) }}" method="POST" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label for="title" class="form-label fw-semibold">Judul Project <span style="color: #f87171;">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" value="{{ project.title }}" required>
                        </div>
                        
                        <!-- Upload gambar -->
                        <div class="mb-4 p-3 rounded" style="background-color: #111113; border: 1px solid var(--border-color);">
                            <label for="image" class="form-label fw-semibold text-primary"><i class="bi bi-image me-2"></i>Ganti Gambar Project (Opsional)</label>
                            
                            {% if project.image %}
                            <div class="mb-3">
                                <img src="{{ url_for('static', filename='uploads/' + project.image) }}" alt="Current Image" class="img-thumbnail shadow-sm" style="max-height: 150px; background-color: var(--bg-card); border-color: var(--border-color);">
                                <div class="small text-muted mt-1">Gambar saat ini</div>
                            </div>
                            {% endif %}
                            
                            <input type="file" class="form-control" id="image" name="image" accept="image/png, image/jpeg, image/jpg, image/gif">
                            <div class="form-text text-muted mt-2"><i class="bi bi-info-circle me-1"></i> Biarkan kosong jika tidak ingin mengubah gambar. Format didukung: JPG, PNG, GIF.</div>
                        </div>

                        <div class="mb-4">
                            <label for="technology" class="form-label fw-semibold">Teknologi yang Digunakan</label>
                            <input type="text" class="form-control" id="technology" name="technology" value="{{ project.technology or '' }}">
                        </div>

                        <div class="mb-4">
                            <label for="github_link" class="form-label fw-semibold"><i class="bi bi-github me-1"></i> Link Repositori GitHub (Opsional)</label>
                            <input type="url" class="form-control" id="github_link" name="github_link" value="{{ project.github_link or '' }}">
                        </div>

                        <div class="mb-4">
                            <label for="link" class="form-label fw-semibold"><i class="bi bi-link-45deg me-1"></i> Link Live Project (Opsional)</label>
                            <input type="url" class="form-control" id="link" name="link" value="{{ project.link or '' }}">
                        </div>

                        <div class="mb-5">
                            <label for="description" class="form-label fw-semibold">Deskripsi Lengkap Project <span style="color: #f87171;">*</span></label>
                            <textarea class="form-control" id="description" name="description" rows="6" required>{{ project.description }}</textarea>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-warning btn-lg px-5 shadow-sm fw-bold text-dark"><i class="bi bi-check-circle me-2"></i> Update Project</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
