{% extends 'base.html' %}
{% block title %}Tambah Project{% endblock %}
{% block content %}
<div class="container py-5 my-3">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex align-items-center mb-4 border-bottom pb-3">
                <a href="{{ url_for('manage_projects') }}" class="btn btn-outline-secondary btn-sm me-3 shadow-sm"><i class="bi bi-arrow-left"></i> Kembali</a>
                <h2 class="fw-bold mb-0 text-primary">Tambah Project Baru</h2>
            </div>
            
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <form action="{{ url_for('add_project') }}" method="POST" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label for="title" class="form-label fw-semibold">Judul Project <span style="color: #f87171;">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" required placeholder="Contoh: Aplikasi Sistem Pakar">
                        </div>
                        
                        <!-- Upload gambar -->
                        <div class="mb-4 p-3 rounded" style="background-color: #111113; border: 1px solid var(--border-color);">
                            <label for="image" class="form-label fw-semibold text-primary"><i class="bi bi-image me-2"></i>Gambar Project (Opsional)</label>
                            <input type="file" class="form-control" id="image" name="image" accept="image/png, image/jpeg, image/jpg, image/gif">
                            <div class="form-text text-muted mt-2"><i class="bi bi-info-circle me-1"></i> Format didukung: JPG, PNG, GIF (Maks. 2MB).</div>
                        </div>

                        <div class="mb-4">
                            <label for="technology" class="form-label fw-semibold">Teknologi yang Digunakan</label>
                            <input type="text" class="form-control" id="technology" name="technology" placeholder="Contoh: Python, Flask, SQLite">
                        </div>

                        <div class="mb-4">
                            <label for="github_link" class="form-label fw-semibold"><i class="bi bi-github me-1"></i> Link Repositori GitHub (Opsional)</label>
                            <input type="url" class="form-control" id="github_link" name="github_link" placeholder="Contoh: https://github.com/username/project">
                        </div>

                        <div class="mb-4">
                            <label for="link" class="form-label fw-semibold"><i class="bi bi-link-45deg me-1"></i> Link Live Project (Opsional)</label>
                            <input type="url" class="form-control" id="link" name="link" placeholder="Contoh: https://live-demo.com">
                        </div>

                        <div class="mb-5">
                            <label for="description" class="form-label fw-semibold">Deskripsi Lengkap Project <span style="color: #f87171;">*</span></label>
                            <textarea class="form-control" id="description" name="description" rows="6" required placeholder="Ceritakan fitur dan kegunaan project ini..."></textarea>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm fw-bold text-dark"><i class="bi bi-save me-2"></i> Simpan Project</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
